<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Резюме | ML Engineer & Developer</title>
    <meta
      name="description"
      content="Сайт-резюме в стиле Yandex Cup: проекты, достижения, Kaggle и GitHub."
    />
    <!-- JetBrains Mono Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <script src="vue.global.js"></script>
  </head>
  <body>
    <div id="app" v-cloak>
      <header class="hero">
        <div class="hero__badge">Available for projects</div>
        <h1 class="hero__title">{{ resume.name }}</h1>
        <p class="hero__subtitle">{{ resume.title }}</p>
        <p class="hero__lead">{{ resume.bio }}</p>

        <div class="hero__links">
          <a :href="resume.links.github" target="_blank" class="btn btn--primary">GitHub</a>
          <a :href="resume.links.kaggle" target="_blank" class="btn btn--secondary">Kaggle</a>
          <a :href="'mailto:' + resume.links.email" class="btn btn--outline">Email</a>
        </div>
      </header>

      <main class="container">
        <section class="section">
          <h2 class="section__title">Достижения</h2>
          <div class="grid grid--achievements">
            <article v-for="ach in resume.achievements" :key="ach.title" class="card card--achievement">
              <div class="card__year">{{ ach.year }}</div>
              <h3 class="card__title">{{ ach.title }}</h3>
              <p class="card__desc">{{ ach.description }}</p>
            </article>
          </div>
        </section>

        <section class="section">
          <h2 class="section__title">Проекты</h2>
          <div class="grid grid--projects">
            <article v-for="project in resume.projects" :key="project.title" class="card card--project">
              <div class="card__tags">
                <span v-for="tag in project.tags" :key="tag" class="tag">{{ tag }}</span>
              </div>
              <h3 class="card__title">{{ project.title }}</h3>
              <p class="card__desc">{{ project.description }}</p>
              <a :href="project.link" target="_blank" class="card__link">View Project →</a>
            </article>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>© 2026 {{ resume.name }} · Построено на Vue 3</p>
      </footer>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
